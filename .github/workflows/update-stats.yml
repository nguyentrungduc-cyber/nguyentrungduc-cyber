name: Update GitHub Stats SVG

on:
  schedule:
    # Chạy vào 00:00 UTC (~7:00 sáng giờ VN) mỗi ngày
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # Cho phép bấm chạy tay từ tab Actions trên GitHub
  push:
    branches: [main]
    paths:
      - "scripts/generate_stats.py"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sinh lại SVG từ dữ liệu GitHub API mới nhất
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_stats.py

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          if git diff --cached --quiet; then
            echo "Không có gì thay đổi, bỏ qua commit."
          else
            git commit -m "chore: auto-update GitHub stats SVG [skip ci]"
            git push
          fi
